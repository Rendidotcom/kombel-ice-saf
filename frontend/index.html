<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unduh Sertifikat ICE SAF</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:20px;
    font-family:Arial,sans-serif;
    background:#f4f4f4;
}

nav{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

nav a{
    text-decoration:none;
    background:#007bff;
    color:white;
    padding:10px 15px;
    border-radius:6px;
    font-size:14px;
    font-weight:bold;
}

nav a:hover{
    background:#0056b3;
}

.container{
    max-width:420px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 2px 12px rgba(0,0,0,.15);
}

h2{
    text-align:center;
    margin-top:0;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
    margin-bottom:15px;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    background:#28a745;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

button:hover{
    opacity:.9;
}

button:disabled{
    background:#999;
    cursor:not-allowed;
}

#message{
    margin-top:18px;
    text-align:center;
    font-weight:bold;
    line-height:1.6;
}

.success{
    color:#1e7e34;
}

.error{
    color:#dc3545;
}

</style>

</head>

<body>

<nav>
    <a href="index.html">🔽 Unduh Sertifikat</a>
    <a href="upload.html">🖼️ Unggah Flyer</a>
    <a href="flyers.html">📄 Lihat Flyer</a>
    <a href="narasumber.html">🎤 Input Narasumber</a>
</nav>

<div class="container">

    <h2>Unduh Sertifikat ICE SAF</h2>

    <input
        type="email"
        id="email"
        placeholder="Masukkan Email Peserta">

    <button
        id="downloadBtn"
        onclick="downloadCertificate()">
        Cek & Download Sertifikat
    </button>

    <div id="message"></div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbxxIMn8m03XNzrNkd75UONuwVBrgvox5TI0QKoOOtpCc8_UMKkHV1bv_58NgwmZ_amGKQ/exec";

const emailInput=document.getElementById("email");
const message=document.getElementById("message");
const button=document.getElementById("downloadBtn");

async function downloadCertificate(){

    const email=emailInput.value.trim();

    message.className="";
    message.innerHTML="";

    if(email===""){

        message.className="error";
        message.innerHTML="Silakan masukkan email peserta.";

        emailInput.focus();

        return;

    }

    button.disabled=true;

    message.className="success";
    message.innerHTML="Sedang membuat sertifikat...";

    try{

        const response=await fetch(

            API_URL+
            "?action=generateCertificate"+
            "&email="+
            encodeURIComponent(email)

        );

        const result=await response.json();

        if(!result.success){

            message.className="error";
            message.innerHTML=result.message;

            button.disabled=false;

            return;

        }

        message.className="success";

        message.innerHTML=
        "Halo <b>"+result.nama+"</b><br>Sertifikat berhasil dibuat.<br>Mengunduh PDF...";

        setTimeout(function(){

            window.location.href=result.url;

        },700);

    }

    catch(error){

        console.error(error);

        message.className="error";

        message.innerHTML="Terjadi kesalahan saat menghubungi server.";

    }

    button.disabled=false;

}

emailInput.addEventListener("keypress",function(e){

    if(e.key==="Enter"){

        downloadCertificate();

    }

});

</script>

</body>
</html>
