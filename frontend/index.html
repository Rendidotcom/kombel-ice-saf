<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cek Sertifikat Anda</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      background: white;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 500px;
    }
    input {
      width: 100%;
      padding: 0.5rem;
      margin: 1rem 0;
      font-size: 1rem;
    }
    button {
      padding: 0.5rem 1rem;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    .error {
      color: red;
      margin-top: 1rem;
    }
    .cert-list {
      margin-top: 1rem;
    }
    .cert-item {
      margin-bottom: 10px;
    }
    .cert-item a {
      color: #007bff;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Cek Sertifikat Anda</h2>
    <input type="email" id="email" placeholder="Masukkan email Anda" />
    <button onclick="loadCertificates()">Tampilkan Sertifikat</button>
    <div class="error" id="error"></div>
    <div class="cert-list" id="certList"></div>
  </div>

  <script>
    const supabaseUrl = 'https://jmmqpqbpdmaelfnjhgly.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImptbXFwcWJwZG1hZWxmbmpoZ2x5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQ4Njk1NzIsImV4cCI6MjA2MDQ0NTU3Mn0.853Yt-zBeLUZeosgS9Df5pYVEklqcprK-PS_1Zgtb4Q';
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    async function loadCertificates() {
      const emailInput = document.getElementById("email");
      const email = emailInput.value.trim().toLowerCase();
      const errorDiv = document.getElementById("error");
      const certList = document.getElementById("certList");
      certList.innerHTML = "";
      errorDiv.textContent = "";

      if (!email) {
        errorDiv.textContent = "Email tidak boleh kosong.";
        return;
      }

      // Convert email to safe format
      const safeEmail = email.replace(/@/g, "_at_").replace(/\./g, "_dot_");

      const { data, error } = await supabase.storage
        .from('certificates')
        .list('', { limit: 100 });

      if (error) {
        errorDiv.textContent = "Gagal mengambil daftar file.";
        console.error(error);
        return;
      }

      const files = data.filter(file => file.name.startsWith(safeEmail));

      if (files.length === 0) {
        errorDiv.textContent = "Sertifikat tidak ditemukan.";
        return;
      }

      files.forEach(file => {
        const url = `${supabaseUrl}/storage/v1/object/public/certificates/${file.name}`;
        const div = document.createElement("div");
        div.className = "cert-item";
        div.innerHTML = `<a href="${url}" target="_blank">${file.name}</a>`;
        certList.appendChild(div);
      });
    }
  </script>
</body>
</html>
