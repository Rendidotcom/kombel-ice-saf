<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unduh Sertifikat ICE SAF</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  padding:20px;
  font-family:Arial,sans-serif;
  background:#f4f4f4;
}

/* =========================
   NAVBAR
========================= */

nav{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:20px;
  flex-wrap:wrap;
}

nav a{
  text-decoration:none;
  background:#007bff;
  color:white;
  padding:10px 15px;
  border-radius:6px;
  font-size:14px;
  font-weight:bold;
}

nav a:hover{
  background:#0056b3;
}

/* =========================
   CONTAINER
========================= */

.container{
  max-width:420px;
  margin:auto;
  background:white;
  padding:30px;
  border-radius:12px;
  box-shadow:0 2px 12px rgba(0,0,0,.15);
}

h2{
  text-align:center;
  margin-top:0;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:12px;
  border:1px solid #ccc;
  border-radius:6px;
  margin-bottom:15px;
}

button{
  width:100%;
  padding:12px;
  background:#28a745;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:16px;
  font-weight:bold;
}

button:hover{
  opacity:.9;
}

button:disabled{
  background:#999;
  cursor:not-allowed;
}

#message{
  margin-top:15px;
  text-align:center;
  font-weight:bold;
}

.success{
  color:green;
}

.error{
  color:red;
}

</style>

</head>

<body>

<nav>
  <a href="index.html">🔽 Unduh Sertifikat</a>
  <a href="upload.html">🖼️ Unggah Flyer</a>
  <a href="flyers.html">📄 Lihat Flyer</a>
  <a href="narasumber.html">🎤 Input Narasumber</a>
</nav>

<div class="container">

  <h2>Unduh Sertifikat ICE SAF</h2>

  <input
    type="email"
    id="email"
    placeholder="Masukkan Email Peserta"
  >

  <button onclick="downloadCertificate()">
    Cek & Download Sertifikat
  </button>

  <div id="message"></div>

</div>

<script>

/*
====================================================
GANTI URL INI KE WEB APP APPS SCRIPT FINAL
====================================================
*/

const API_URL =
"https://script.google.com/macros/s/AKfycbxxxxxxxxxxxxxxxxxxxxxxxxxxxx/exec";

async function downloadCertificate(){

  const email =
    document
      .getElementById("email")
      .value
      .trim();

  const message =
    document.getElementById("message");

  message.className = "";
  message.innerHTML = "";

  if(!email){

    message.className = "error";
    message.innerHTML =
      "Email wajib diisi";

    return;
  }

  try{

    message.innerHTML =
      "Mencari sertifikat...";

    const url =
      API_URL +
      "?action=certificate" +
      "&email=" +
      encodeURIComponent(email);

    window.open(
      url,
      "_blank"
    );

    message.className =
      "success";

    message.innerHTML =
      "Jika data ditemukan, sertifikat akan otomatis terunduh.";

  }catch(err){

    console.error(err);

    message.className =
      "error";

    message.innerHTML =
      "Terjadi kesalahan.";

  }

}

</script>

</body>
</html>
