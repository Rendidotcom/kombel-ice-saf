<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flyer Kegiatan ICE SAF</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  padding:20px;
  font-family:Arial,sans-serif;
  background:#f4f4f4;
}

nav{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:20px;
  flex-wrap:wrap;
}

nav a{
  text-decoration:none;
  background:#007bff;
  color:#fff;
  padding:10px 15px;
  border-radius:6px;
  font-size:14px;
}

nav a:hover{
  background:#0056b3;
}

h1{
  text-align:center;
  margin-bottom:30px;
}

.flyer-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:20px;
}

.flyer-card{
  background:#fff;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 2px 10px rgba(0,0,0,.15);
  transition:.2s;
}

.flyer-card:hover{
  transform:translateY(-3px);
}

.flyer-image{
  width:100%;
  height:420px;
  object-fit:cover;
  cursor:pointer;
  display:block;
}

.flyer-content{
  padding:15px;
}

.flyer-content h3{
  margin-top:0;
  margin-bottom:10px;
}

.flyer-content p{
  margin:6px 0;
}

.daftar-btn{
  display:block;
  text-align:center;
  padding:12px;
  background:#007bff;
  color:white;
  text-decoration:none;
  font-weight:bold;
}

.daftar-btn:hover{
  background:#0056b3;
}

.empty{
  text-align:center;
  color:#666;
  font-size:18px;
  margin-top:40px;
}

.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.9);
  justify-content:center;
  align-items:center;
  z-index:9999;
  padding:20px;
}

.modal.show{
  display:flex;
}

.modal img{
  max-width:95%;
  max-height:95%;
  border-radius:10px;
}

.loading{
  text-align:center;
  font-size:18px;
  color:#555;
}

</style>
</head>

<body>

<nav>
  <a href="index.html">🔽 Unduh Sertifikat</a>
  <a href="upload.html">🖼️ Unggah Flyer</a>
  <a href="flyers.html">📄 Lihat Flyer</a>
</nav>

<h1>Flyer Kegiatan ICE SAF</h1>

<div id="flyerGrid" class="flyer-grid">
  <div class="loading">Memuat data flyer...</div>
</div>

<div id="modal" class="modal">
  <img id="modalImg" src="">
</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbw8R8VkhJvlG1gaFonBSxeD1JBH0rRvA0g1iDo8NJN5D31KXpfK2rK3QkB7crRXTUBGFg/exec?action=getFlyers";

const DAFTAR_URL =
"https://docs.google.com/forms/d/e/1FAIpQLSdNOC8FuXcupj0QU-Y-TP-w4IncAKSPsCiN8gt_sGXZaa6XaQ/viewform";

const flyerGrid =
document.getElementById("flyerGrid");

const modal =
document.getElementById("modal");

const modalImg =
document.getElementById("modalImg");

async function loadFlyers(){

  try{

    const response =
      await fetch(API_URL);

    const flyers =
      await response.json();

    console.log("FLYERS:", flyers);

    if(!Array.isArray(flyers)){

      flyerGrid.innerHTML =
        '<div class="empty">Format data API tidak valid.</div>';

      console.error(flyers);
      return;
    }

    if(flyers.length === 0){

      flyerGrid.innerHTML =
        '<div class="empty">Belum ada flyer.</div>';

      return;
    }

    flyerGrid.innerHTML = "";

    flyers.forEach(flyer => {

      const imageSrc =
        `https://drive.google.com/thumbnail?id=${flyer.fileId}&sz=w1200`;

      const card =
        document.createElement("div");

      card.className =
        "flyer-card";

      card.innerHTML = `
        <img
          class="flyer-image"
          src="${imageSrc}"
          alt="${flyer.judul}"
          loading="lazy"
        >

        <div class="flyer-content">

          <h3>${flyer.judul}</h3>

          <p>
            <strong>Pemateri:</strong>
            ${flyer.nama}
          </p>

          <p>
            <strong>Tanggal:</strong>
            ${flyer.tanggal}
          </p>

          <p>
            <strong>Tempat:</strong>
            ${flyer.tempat}
          </p>

          <p>
            <strong>Waktu:</strong>
            ${flyer.waktu}
          </p>

        </div>

        <a
          class="daftar-btn"
          href="${DAFTAR_URL}"
          target="_blank"
        >
          Daftar Sekarang
        </a>
      `;

      const image =
        card.querySelector(".flyer-image");

      image.addEventListener(
        "click",
        () => {

          modalImg.src =
            `https://drive.google.com/thumbnail?id=${flyer.fileId}&sz=w2500`;

          modal.classList.add("show");

        }
      );

      flyerGrid.appendChild(card);

    });

  }catch(err){

    console.error(err);

    flyerGrid.innerHTML =
      '<div class="empty">Gagal memuat data flyer.</div>';

  }

}

modal.addEventListener(
  "click",
  () => {
    modal.classList.remove("show");
  }
);

loadFlyers();

</script>

</body>
</html>
