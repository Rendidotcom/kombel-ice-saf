<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flyer Kegiatan ICE SAF</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  padding:20px;
  font-family:Arial,sans-serif;
  background:#f4f4f4;
}

nav{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:20px;
  flex-wrap:wrap;
}

nav a{
  text-decoration:none;
  background:#007bff;
  color:#fff;
  padding:8px 14px;
  border-radius:6px;
  font-size:14px;
}

nav a:hover{
  background:#0056b3;
}

h1{
  text-align:center;
  margin-bottom:25px;
}

.flyer-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:20px;
}

.flyer-card{
  background:#fff;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 2px 10px rgba(0,0,0,.15);
}

.flyer-image{
  width:100%;
  height:380px;
  object-fit:cover;
  cursor:pointer;
}

.flyer-content{
  padding:15px;
}

.flyer-content h3{
  margin-top:0;
}

.flyer-content p{
  margin:6px 0;
}

.daftar-btn{
  display:block;
  text-align:center;
  padding:12px;
  background:#007bff;
  color:#fff;
  text-decoration:none;
  font-weight:bold;
}

.daftar-btn:hover{
  background:#0056b3;
}

.empty{
  text-align:center;
  font-size:18px;
  color:#666;
  margin-top:50px;
}

.modal{
  display:none;
  position:fixed;
  left:0;
  top:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.85);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.modal.show{
  display:flex;
}

.modal img{
  max-width:90%;
  max-height:90%;
}
</style>

</head>

<body>

<nav>
  <a href="index.html">🔽 Unduh Sertifikat</a>
  <a href="upload.html">🖼️ Unggah Flyer</a>
  <a href="flyers.html">📄 Lihat Flyer</a>
</nav>

<h1>Flyer Kegiatan ICE SAF</h1>

<div id="flyerGrid" class="flyer-grid"></div>

<div id="modal" class="modal">
  <img id="modalImg" src="">
</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbw8R8VkhJvlG1gaFonBSxeD1JBH0rRvA0g1iDo8NJN5D31KXpfK2rK3QkB7crRXTUBGFg/exec?action=getFlyers";

const DAFTAR_URL =
"https://docs.google.com/forms/d/e/1FAIpQLSdNOC8FuXcupj0QU-Y-TP-w4IncAKSPsCiN8gt_sGXZaa6XaQ/viewform";

const flyerGrid =
document.getElementById("flyerGrid");

const modal =
document.getElementById("modal");

const modalImg =
document.getElementById("modalImg");

function fixImageUrl(url){

  if(!url) return "";

  if(url.includes("/file/d/")){

    const id =
      url.split("/file/d/")[1]
         .split("/")[0];

    return "https://drive.google.com/uc?export=view&id=" + id;
  }

  return url;
}

async function loadFlyers(){

  try{

    console.log("LOAD:", API_URL);

    const response =
      await fetch(API_URL);

    const flyers =
      await response.json();

    console.log("DATA:", flyers);

    if(!Array.isArray(flyers)){

      flyerGrid.innerHTML =
        '<div class="empty">Data flyer tidak valid.</div>';

      return;
    }

    if(flyers.length === 0){

      flyerGrid.innerHTML =
        '<div class="empty">Belum ada flyer.</div>';

      return;
    }

    flyerGrid.innerHTML = "";

    flyers.forEach(flyer => {

      const imageUrl =
        fixImageUrl(flyer.imageUrl);

      const card =
        document.createElement("div");

      card.className =
        "flyer-card";

      card.innerHTML = `
        <img
          class="flyer-image"
          src="${imageUrl}"
          alt="${flyer.judul}"
        >

        <div class="flyer-content">

          <h3>${flyer.judul || ""}</h3>

          <p>
            <strong>Pemateri:</strong>
            ${flyer.nama || ""}
          </p>

          <p>
            <strong>Tanggal:</strong>
            ${flyer.tanggal || ""}
          </p>

          <p>
            <strong>Tempat:</strong>
            ${flyer.tempat || ""}
          </p>

          <p>
            <strong>Waktu:</strong>
            ${flyer.waktu || ""}
          </p>

        </div>

        <a
          class="daftar-btn"
          href="${DAFTAR_URL}"
          target="_blank"
        >
          Daftar Sekarang
        </a>
      `;

      const image =
        card.querySelector(".flyer-image");

      image.addEventListener("click", () => {

        modalImg.src = imageUrl;
        modal.classList.add("show");

      });

      flyerGrid.appendChild(card);

    });

  }catch(err){

    console.error("LOAD ERROR:", err);

    flyerGrid.innerHTML =
      '<div class="empty">Gagal memuat data flyer.</div>';

  }

}

modal.addEventListener(
  "click",
  () => {
    modal.classList.remove("show");
  }
);

loadFlyers();

</script>

</body>
</html>
