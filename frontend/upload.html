<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Flyer - Kombel ICE SAF</title>

<style>

*{
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#f4f4f4;
margin:0;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
}

h1{
text-align:center;
}

form{
background:#fff;
padding:25px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

label{
display:block;
margin-top:12px;
font-weight:bold;
}

input{
width:100%;
padding:10px;
margin-top:5px;
}

button{
width:100%;
padding:12px;
margin-top:20px;
background:#28a745;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:disabled{
background:#999;
}

#status{
margin-top:15px;
text-align:center;
font-weight:bold;
}

</style>

</head>
<body>

<div class="container">

<h1>Upload Flyer Baru</h1>

<form id="uploadForm">

<label>Nama Pemateri</label>
<input type="text" id="nama" required>

<label>Judul Materi</label>
<input type="text" id="judul_materi" required>

<label>Tanggal Pelaksanaan</label>
<input type="date" id="tanggal" required>

<label>Tempat Pelaksanaan</label>
<input type="text" id="tempat" required>

<label>Waktu Pelaksanaan</label>
<input type="text" id="waktu" required>

<label>Upload Flyer</label>
<input type="file" id="foto" accept="image/*" required>

<button type="submit">
Kirim Flyer
</button>

</form>

<div id="status"></div>

</div>

<script src="/js/upload.js"></script>
</body>
</html>
