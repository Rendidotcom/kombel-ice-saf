<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Flyer ICE SAF</title>

<style>

*{
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#f4f4f4;
margin:0;
padding:20px;
}

nav{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

nav a{
text-decoration:none;
background:#007bff;
color:#fff;
padding:10px 15px;
border-radius:6px;
font-size:14px;
font-weight:bold;
}

nav a:hover{
background:#0056b3;
}

.container{
max-width:700px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:20px;
}

form{
background:#fff;
padding:25px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.info{
background:#eaf4ff;
border-left:4px solid #007bff;
padding:12px;
margin-bottom:20px;
border-radius:5px;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input{
width:100%;
padding:12px;
margin-top:5px;
border:1px solid #ccc;
border-radius:5px;
font-size:15px;
}

button{
width:100%;
padding:14px;
margin-top:20px;
background:#28a745;
color:white;
border:none;
border-radius:6px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:.9;
}

button:disabled{
background:#999;
cursor:not-allowed;
}

#status{
margin-top:15px;
text-align:center;
font-weight:bold;
}

#resultBox{
display:none;
background:#fff;
padding:20px;
margin-top:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
text-align:center;
}

.result-btn{
display:block;
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:5px;
font-size:15px;
cursor:pointer;
}

#backBtn{
background:#007bff;
color:white;
}

#viewBtn{
background:#17a2b8;
color:white;
}

#downloadBtn{
background:#ffc107;
color:black;
}

</style>

</head>

<body>

<nav>
<a href="index.html">🔽 Unduh Sertifikat</a>
<a href="upload.html">🖼️ Upload Flyer</a>
<a href="flyers.html">📄 Lihat Flyer</a>
<a href="narasumber.html">🎤 Input Narasumber</a>
</nav>

<div class="container">

<h1>Upload Flyer ICE SAF</h1>

<form id="uploadForm">

<div class="info">
Masukkan <b>Nama Pemateri</b> dan <b>Tanggal Pelaksanaan</b> yang sudah terdaftar pada menu Input Narasumber.
</div>

<label>Nama Pemateri</label> <input
type="text"
id="nama"
placeholder="Contoh: Rendi"
required>

<label>Tanggal Pelaksanaan</label> <input
type="date"
id="tanggal"
required>

<label>Upload Flyer</label> <input
type="file"
id="foto"
accept="image/*"
required>

<button
type="submit"
id="submitBtn">
🖼️ Upload Flyer </button>

</form>

<div id="status"></div>

<div id="resultBox">

<h3>✅ Upload Berhasil</h3>

<button
class="result-btn"
id="backBtn"
type="button">
📄 Lihat Flyer </button>

<button
class="result-btn"
id="viewBtn"
type="button">
📋 Daftar Kegiatan </button>

<button
class="result-btn"
id="downloadBtn"
type="button">
🔽 Unduh Sertifikat </button>

</div>

</div>

<script src="js/upload.js"></script>

</body>
</html>
