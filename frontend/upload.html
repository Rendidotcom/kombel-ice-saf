<html lang="id">
<head>
  <meta charset="UTF-8" />

  <style>
    body {
      font-family: Arial, sans-serif;

      padding: 20px;

    nav {
      margin-bottom: 20px;

<body>

  <nav>
    <a href="index.html">🔽 Unduh Sertifikat</a>
    <a href="upload.html">🖼️ Unggah Flyer</a>
    <a href="flyers.html">📄 Lihat Flyer</a>
  </nav>

  <h1>Upload Flyer Baru</h1>

  <form id="uploadForm">

```
<label>Nama Pemateri:</label>
<input type="text" id="nama" required />

<label>Judul Materi:</label>
<input type="text" id="judul_materi" required />

<label>Tanggal Pelaksanaan:</label>
<input type="date" id="tanggal" required />

<label>Tempat Pelaksanaan:</label>
<input type="text" id="tempat" required />

<label>Waktu Pelaksanaan:</label>
<input
  type="text"
  id="waktu"
  placeholder="Contoh: 08:00 - 10:00"
  required
/>

<label>Upload Foto Flyer:</label>
<input
  type="file"
  id="foto"
  accept="image/*"
  required
/>

<button type="submit">
  Kirim
</button>
```

  </form>

  <script>

    const WEBAPP_URL =
      "https://script.google.com/macros/s/AKfycbw__0YPSNi-fT08-lbrb799jYh7v8FoRWriScq0kAYPL0o_u0FTXTRUCFAUyWLjofIu5g/exec";

    document
      .getElementById("uploadForm")
      .addEventListener("submit", async function (e) {

        e.preventDefault();

        const nama =
          document.getElementById("nama").value.trim();

        const judul =
          document.getElementById("judul_materi").value.trim();

        const tanggal =
          document.getElementById("tanggal").value;

        const tempat =
          document.getElementById("tempat").value.trim();

        const waktu =
          document.getElementById("waktu").value.trim();

        const file =
          document.getElementById("foto").files[0];

        if (!file) {
          alert("Silakan pilih file flyer.");
          return;
        }

        const submitButton =
          document.querySelector(
            "button[type='submit']"
          );

        submitButton.disabled = true;
        submitButton.textContent = "Mengupload...";

        try {

          const base64 =
            await fileToBase64(file);

          const response = await fetch(
            WEBAPP_URL,
            {
              method: "POST",
              body: JSON.stringify({
                nama: nama,
                judul: judul,
                tanggal: tanggal,
                tempat: tempat,
                waktu: waktu,
                fileName: file.name,
                mimeType: file.type,
                image: base64
              })
            }
          );

          const result =
            await response.json();

          if (!result.success) {

            alert(
              "❌ Upload gagal\n\n" +
              (result.error || "Unknown error")
            );

            console.error(result);

            return;
          }

          alert(
            "✅ Flyer berhasil disimpan ke Google Drive"
          );

          document
            .getElementById("uploadForm")
            .reset();

        } catch (err) {

          console.error(err);

          alert(
            "❌ Terjadi kesalahan\n\n" +
            err.message
          );

        } finally {

          submitButton.disabled = false;
          submitButton.textContent = "Kirim";

        }

      });

    function fileToBase64(file) {

      return new Promise((resolve, reject) => {

        const reader = new FileReader();

        reader.onload = () => {

          resolve(
            reader.result.split(",")[1]
          );

        };

        reader.onerror = reject;

        reader.readAsDataURL(file);

      });

    }

  </script>

</body>
</html>
