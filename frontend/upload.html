<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Flyer - ICE SAF</title>

<style>

*{
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  background:#f4f4f4;
  margin:0;
  padding:20px;
}

/* =========================
   NAVBAR
========================= */

nav{
  display:flex;
  gap:10px;
  justify-content:center;
  margin-bottom:20px;
  flex-wrap:wrap;
}

nav a{
  text-decoration:none;
  background:#007bff;
  color:white;
  padding:10px 15px;
  border-radius:6px;
  font-size:14px;
  font-weight:bold;
}

nav a:hover{
  background:#0056b3;
}

/* =========================
   CONTAINER
========================= */

.container{
  max-width:700px;
  margin:auto;
}

h1{
  text-align:center;
  margin-bottom:25px;
}

/* =========================
   FORM
========================= */

form{
  background:white;
  padding:25px;
  border-radius:12px;
  box-shadow:0 2px 10px rgba(0,0,0,.1);
}

label{
  display:block;
  margin-top:12px;
  font-weight:bold;
}

input{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:1px solid #ccc;
  border-radius:6px;
}

/* =========================
   BUTTON
========================= */

button{
  width:100%;
  padding:12px;
  margin-top:20px;
  background:#28a745;
  color:white;
  border:none;
  border-radius:6px;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  opacity:.9;
}

button:disabled{
  background:#999;
  cursor:not-allowed;
}

/* =========================
   STATUS
========================= */

#status{
  margin-top:15px;
  text-align:center;
  font-weight:bold;
}

/* =========================
   RESULT
========================= */

#resultBox{
  display:none;
  background:white;
  padding:20px;
  margin-top:20px;
  border-radius:12px;
  box-shadow:0 2px 10px rgba(0,0,0,.1);
  text-align:center;
}

.result-btn{
  display:block;
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  font-size:15px;
  cursor:pointer;
}

#backBtn{
  background:#007bff;
  color:white;
}

#viewBtn{
  background:#17a2b8;
  color:white;
}

#downloadBtn{
  background:#ffc107;
  color:black;
}

</style>

</head>

<body>

<nav>
  <a href="index.html">🔽 Unduh Sertifikat</a>
  <a href="upload.html">🖼️ Unggah Flyer</a>
  <a href="flyers.html">📄 Lihat Flyer</a>
  <a href="narasumber.html">🎤 Input Narasumber</a>
</nav>

<div class="container">

<h1>Upload Flyer Baru</h1>

<form id="uploadForm">

<label>Nama Pemateri</label>
<input
type="text"
id="nama"
required

>

<label>Judul Materi</label>
<input
type="text"
id="judul_materi"
required

>

<label>Tanggal Pelaksanaan</label>
<input
type="date"
id="tanggal"
required

>

<label>Tempat Pelaksanaan</label>
<input
type="text"
id="tempat"
required

>

<label>Waktu Pelaksanaan</label>
<input
type="text"
id="waktu"
placeholder="08.00 - 10.00 WIB"
required

>

<label>Upload Flyer</label>
<input
type="file"
id="foto"
accept="image/*"
required

>

<button
type="submit"
id="submitBtn"

>

```
Kirim Flyer
```

  </button>

</form>

<div id="status"></div>

<div id="resultBox">

  <h3>✅ Upload Berhasil</h3>

<button
class="result-btn"
id="backBtn"
type="button"
onclick="location.href='flyers.html'"

>

```
📄 Kembali ke Halaman Flyer
```

  </button>

<button
class="result-btn"
id="viewBtn"
type="button"
onclick="location.href='flyers.html'"

>

```
👁️ Lihat Flyer
```

  </button>

<button
class="result-btn"
id="downloadBtn"
type="button"
onclick="location.href='index.html'"

>

```
🔽 Unduh Sertifikat
```

  </button>

</div>

</div>

<script src="js/upload.js"></script>

</body>
</html>
