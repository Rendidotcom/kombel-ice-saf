<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbxxxxxxxxxxxxxxxxxxxxxxxxxxxx/exec";

async function simpanJadwal() {

  const nama =
    document.getElementById("nama").value.trim();

  const judul =
    document.getElementById("judul").value.trim();

  const tanggal =
    document.getElementById("tanggal").value;

  const tempat =
    document.getElementById("tempat").value.trim();

  const waktu =
    document.getElementById("waktu").value.trim();

  const imageUrl =
    document.getElementById("imageUrl").value.trim();

  const status =
    document.getElementById("status");

  status.innerHTML = "Menyimpan...";

  const formData =
    new FormData();

  formData.append(
    "action",
    "saveNarasumber"
  );

  formData.append(
    "nama",
    nama
  );

  formData.append(
    "judul",
    judul
  );

  formData.append(
    "tanggal",
    tanggal
  );

  formData.append(
    "tempat",
    tempat
  );

  formData.append(
    "waktu",
    waktu
  );

  formData.append(
    "imageUrl",
    imageUrl
  );

  try {

    const response =
      await fetch(
        API_URL,
        {
          method: "POST",
          body: formData
        }
      );

    const result =
      await response.json();

    if(result.success){

      status.innerHTML =
        "✅ Jadwal berhasil disimpan";

      document
        .getElementById("narasumberForm")
        .reset();

    } else {

      status.innerHTML =
        "❌ " + result.error;

    }

  } catch(err){

    status.innerHTML =
      "❌ Gagal koneksi";

  }

}

</script>
