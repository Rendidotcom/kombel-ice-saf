<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Input Narasumber ICE SAF</title>

<style>

body{
  font-family:Arial,sans-serif;
  background:#f4f4f4;
  padding:20px;
}

.container{
  max-width:700px;
  margin:auto;
  background:white;
  padding:25px;
  border-radius:10px;
  box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h1{
  text-align:center;
}

label{
  display:block;
  margin-top:12px;
  font-weight:bold;
}

input{
  width:100%;
  padding:10px;
  margin-top:5px;
}

button{
  width:100%;
  margin-top:20px;
  padding:12px;
  border:none;
  background:#28a745;
  color:white;
  font-size:16px;
  border-radius:6px;
  cursor:pointer;
}

button:hover{
  opacity:.9;
}

#status{
  margin-top:20px;
  text-align:center;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>Input Jadwal Narasumber</h1>

<form id="narasumberForm">

<label>Nama Pemateri</label>
<input type="text" id="nama" required>

<label>Judul Materi</label>
<input type="text" id="judul" required>

<label>Tanggal</label>
<input type="date" id="tanggal" required>

<label>Tempat</label>
<input type="text" id="tempat" required>

<label>Waktu</label>
<input type="text" id="waktu" required>

<label>Link Flyer Google Drive</label>
<input
  type="text"
  id="imageUrl"
  placeholder="https://drive.google.com/file/d/FILE_ID/view"
  required
>

<button type="submit">
Simpan Jadwal
</button>

</form>

<div id="status"></div>

</div>

<script src="js/narasumber.js"></script>

</body>
</html>
