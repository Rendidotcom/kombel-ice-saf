<!DOCTYPE html>

<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Input Narasumber ICE SAF</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  padding:20px;
  background:#f4f4f4;
  font-family:Arial,sans-serif;
}

nav{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:25px;
}

nav a{
  text-decoration:none;
  background:#007bff;
  color:white;
  padding:10px 15px;
  border-radius:6px;
  font-size:14px;
  font-weight:bold;
}

nav a:hover{
  background:#0056b3;
}

.container{
  max-width:700px;
  margin:auto;
}

.card{
  background:white;
  padding:25px;
  border-radius:10px;
  box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h1{
  text-align:center;
  margin-bottom:25px;
}

label{
  display:block;
  margin-top:15px;
  font-weight:bold;
}

input{
  width:100%;
  padding:10px;
  margin-top:5px;
}

button{
  width:100%;
  padding:12px;
  margin-top:25px;
  border:none;
  border-radius:6px;
  background:#28a745;
  color:white;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  opacity:.9;
}

#status{
  margin-top:20px;
  text-align:center;
  font-weight:bold;
}

.info{
  margin-bottom:20px;
  padding:15px;
  background:#eef7ff;
  border-left:4px solid #007bff;
  border-radius:5px;
}

</style>

</head>

<body>

<nav>

  <a href="index.html">
    🔽 Unduh Sertifikat
  </a>

  <a href="upload.html">
    🖼️ Unggah Flyer
  </a>

  <a href="flyers.html">
    📄 Lihat Flyer
  </a>

  <a href="narasumber.html">
    🎤 Input Narasumber
  </a>

</nav>

<div class="container">

<div class="card">

<h1>Input Jadwal Narasumber</h1>

<div class="info">
Masukkan data narasumber dan link flyer Google Drive yang sudah diupload sebelumnya.
</div>

<form id="narasumberForm">

<label>Nama Pemateri</label>
<input
type="text"
id="nama"
required

>

<label>Judul Materi</label>
<input
type="text"
id="judul"
required

>

<label>Tanggal Pelaksanaan</label>
<input
type="date"
id="tanggal"
required

>

<label>Tempat Pelaksanaan</label>
<input
type="text"
id="tempat"
required

>

<label>Waktu Pelaksanaan</label>
<input
type="text"
id="waktu"
placeholder="08.00 - 10.00 WIB"
required

>

<button type="submit">

🎤 Simpan Jadwal Narasumber

</button>

</form>

<div id="status"></div>

</div>

</div>

<script src="js/narasumber.js"></script>

</body>
</html>
